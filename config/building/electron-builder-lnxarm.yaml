appId: app.hamrochurch
productName: Hamro Church
artifactName: HamroChurch-${version}-${arch}.${ext}

files:
    - build/electron/**
    - build/types/**
    - public/**
    - "!node_modules/@napi-rs"

publish:
    provider: github
    owner: Hamro-Church
    repo: HamroChurch
    releaseType: release

extraResources:
    - from: node_modules/slideshow/
      to: slideshow
      filter:
          - connector-*

# linux

linux:
    asarUnpack:
        - "**/node_modules/grandiose/**"
        - "**/node_modules/macadam/**/*.node"
        - "**/node_modules/libltc-wrapper/**/*"
    category: AudioVideo
    target:
        - AppImage
        - deb
        - rpm
    icon: build/public

deb:
    depends:
        - libfontconfig1
        - uuid-runtime
        - libltc11
