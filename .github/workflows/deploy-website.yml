name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve_method:
    name: Resolve Deployment Method
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
      REMOTE_USER: ${{ secrets.REMOTE_USER }}
      TARGET: ${{ secrets.TARGET }}
    outputs:
      method: ${{ steps.choose.outputs.method }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Verify website bundle exists
        run: |
          test -d website
          test -f website/index.html

      - name: Choose deployment method
        id: choose
        shell: bash
        run: |
          ftp_ready=false
          ssh_ready=false

          if [[ -n "$FTP_SERVER" && -n "$FTP_USERNAME" && -n "$FTP_PASSWORD" && -n "$REMOTE_DIR" ]]; then
            ftp_ready=true
          fi

          if [[ -n "$SSH_PRIVATE_KEY" && -n "$REMOTE_HOST" && -n "$REMOTE_USER" && -n "$TARGET" ]]; then
            ssh_ready=true
          fi

          if [[ "$ftp_ready" == true && "$ssh_ready" == true ]]; then
            echo "method=conflict" >> "$GITHUB_OUTPUT"
          elif [[ "$ftp_ready" == true ]]; then
            echo "method=ftp" >> "$GITHUB_OUTPUT"
          elif [[ "$ssh_ready" == true ]]; then
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "method=none" >> "$GITHUB_OUTPUT"
          fi

  deploy_ftp:
    name: Deploy Website via FTP
    runs-on: ubuntu-latest
    needs: resolve_method
    if: needs.resolve_method.outputs.method == 'ftp'
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Deploy website over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./website/
          server-dir: ${{ secrets.REMOTE_DIR }}
          dangerous-clean-slate: false

  deploy_ssh:
    name: Deploy Website via SSH
    runs-on: ubuntu-latest
    needs: resolve_method
    if: needs.resolve_method.outputs.method == 'ssh'
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Deploy website over SSH + rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.TARGET }}
          SOURCE: website/
          ARGS: "-rlgoDzvc --delete"
          EXCLUDE: "/.git/, /.github/"

  deploy_not_configured:
    name: Deployment Not Configured
    runs-on: ubuntu-latest
    needs: resolve_method
    if: needs.resolve_method.outputs.method == 'none'
    steps:
      - name: Explain skipped deployment
        run: |
          echo "No deployment secrets were configured. Set either the FTP or SSH secret set described in RELEASE-INSTRUCTIONS.md."

  deploy_conflict:
    name: Deployment Secret Conflict
    runs-on: ubuntu-latest
    needs: resolve_method
    if: needs.resolve_method.outputs.method == 'conflict'
    steps:
      - name: Fail because both deployment methods are configured
        run: |
          echo "Configure either FTP secrets or SSH secrets, not both."
          exit 1

