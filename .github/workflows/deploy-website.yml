name: Deploy Website Manual

on:
  workflow_dispatch:

env:
  FTP_HOST: ${{ secrets.FTP_HOST }}
  FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
  FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
  FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  REMOTE_PATH: ${{ secrets.REMOTE_PATH }}

permissions:
  contents: read

concurrency:
  group: website-deploy
  cancel-in-progress: true

jobs:
  deploy_website:
    name: Deploy Website
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          path: project

      - name: Verify website path exists
        run: |
          test -d project/website
          test -f project/website/index.html

      - name: Determine deployment mode
        id: deploy_mode
        shell: bash
        run: |
          if [[ -n "$FTP_HOST" && -n "$FTP_USERNAME" && -n "$FTP_PASSWORD" && -n "$FTP_REMOTE_DIR" && -z "$SSH_HOST" ]]; then
            echo "mode=ftp" >> "$GITHUB_OUTPUT"
          elif [[ -n "$SSH_HOST" && -n "$SSH_USER" && -n "$SSH_PRIVATE_KEY" && -n "$REMOTE_PATH" ]]; then
            echo "mode=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Install lftp
        if: steps.deploy_mode.outputs.mode == 'ftp'
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Sync website over FTP
        if: steps.deploy_mode.outputs.mode == 'ftp'
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" -e "set ssl:verify-certificate no; set ftp:passive-mode on; mirror --reverse --delete --verbose project/website/ \"$FTP_REMOTE_DIR\"; bye"

      - name: Install rsync and OpenSSH client
        if: steps.deploy_mode.outputs.mode == 'ssh'
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH access
        if: steps.deploy_mode.outputs.mode == 'ssh'
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync website over rsync
        if: steps.deploy_mode.outputs.mode == 'ssh'
        run: |
          rsync -az --delete project/website/ "$SSH_USER@$SSH_HOST:$REMOTE_PATH"

      - name: Skip deployment
        if: steps.deploy_mode.outputs.mode == 'skip'
        run: echo "No FTP or SSH deployment secrets were configured, so website deployment was skipped."
