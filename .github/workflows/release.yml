name: Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

env:
  FTP_HOST: ${{ secrets.FTP_HOST }}
  FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
  FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
  FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  REMOTE_PATH: ${{ secrets.REMOTE_PATH }}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            artifact_name: release-windows
            asset_globs: |
              project/dist/*.exe
              project/dist/*.exe.blockmap
              project/dist/latest*.yml
          - name: macOS
            os: macos-latest
            artifact_name: release-macos
            asset_globs: |
              project/dist/*.dmg
              project/dist/*.zip
              project/dist/latest*.yml
              project/dist/*.blockmap
          - name: Linux
            os: ubuntu-latest
            artifact_name: release-linux
            asset_globs: |
              project/dist/*.AppImage
              project/dist/*.deb
              project/dist/*.rpm
              project/dist/latest*.yml
              project/dist/*.blockmap

    steps:
      - name: Check out Git repository into a no-space path
        uses: actions/checkout@v4
        with:
          path: project
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: project/.nvmrc
          cache: npm
          cache-dependency-path: project/package-lock.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev uuid-dev libltc-dev ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Install node-gyp on macOS
        if: runner.os == 'macOS'
        run: npm install -g node-gyp

      - name: Install dependencies
        working-directory: project
        run: npm install

      - name: Restore the NDI SDK for grandiose on Windows
        if: runner.os == 'Windows'
        working-directory: project
        run: node .\node_modules\grandiose\ndi.js

      - name: Install dmg-license on macOS
        if: runner.os == 'macOS'
        working-directory: project
        run: npm install dmg-license

      - name: Build production bundles
        working-directory: project
        run: npm run build

      - name: Build release artifacts
        working-directory: project
        run: npx electron-builder --config config/building/electron-builder.yaml --publish never

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.asset_globs }}
          if-no-files-found: error
          retention-days: 14

  publish_release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*

  verify_website:
    if: github.ref == 'refs/heads/main'
    name: Verify Website Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          path: project

      - name: Verify website path exists
        run: |
          test -d project/website
          test -f project/website/index.html

  deploy_via_ftp:
    if: github.ref == 'refs/heads/main' && env.FTP_HOST != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' && env.FTP_REMOTE_DIR != '' && env.SSH_HOST == ''
    name: Deploy Website via FTP
    needs: verify_website
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          path: project

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Sync website over FTP
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" -e "set ssl:verify-certificate no; set ftp:passive-mode on; mirror --reverse --delete --verbose project/website/ \"$FTP_REMOTE_DIR\"; bye"

  deploy_via_rsync:
    if: github.ref == 'refs/heads/main' && env.SSH_HOST != '' && env.SSH_USER != '' && env.SSH_PRIVATE_KEY != '' && env.REMOTE_PATH != ''
    name: Deploy Website via rsync over SSH
    needs: verify_website
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          path: project

      - name: Install rsync and OpenSSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH access
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync website over rsync
        run: |
          rsync -az --delete project/website/ "$SSH_USER@$SSH_HOST:$REMOTE_PATH"

  no_deploy_target:
    if: github.ref == 'refs/heads/main' && !(env.FTP_HOST != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' && env.FTP_REMOTE_DIR != '') && !(env.SSH_HOST != '' && env.SSH_USER != '' && env.SSH_PRIVATE_KEY != '' && env.REMOTE_PATH != '')
    name: Skip Website Deploy
    needs: verify_website
    runs-on: ubuntu-latest
    steps:
      - name: No deployment secrets configured
        run: echo "No FTP or SSH deployment secrets were configured, so website deployment was skipped."
