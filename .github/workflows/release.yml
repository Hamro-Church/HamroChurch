name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            artifact_name: release-windows
            asset_globs: |
              project/dist/*.exe
              project/dist/*.exe.blockmap
              project/dist/latest*.yml
          - name: macOS
            os: macos-latest
            artifact_name: release-macos
            asset_globs: |
              project/dist/*.dmg
              project/dist/*.zip
              project/dist/latest*.yml
              project/dist/*.blockmap
          - name: Linux
            os: ubuntu-latest
            artifact_name: release-linux
            asset_globs: |
              project/dist/*.AppImage
              project/dist/*.deb
              project/dist/*.rpm
              project/dist/latest*.yml
              project/dist/*.blockmap

    steps:
      - name: Check out Git repository into a no-space path
        uses: actions/checkout@v4
        with:
          path: project
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: project/.nvmrc
          cache: npm
          cache-dependency-path: project/package-lock.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev uuid-dev libltc-dev ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Install node-gyp on macOS
        if: runner.os == 'macOS'
        run: npm install -g node-gyp

      - name: Install dependencies
        working-directory: project
        run: npm install

      - name: Restore the NDI SDK for grandiose on Windows
        if: runner.os == 'Windows'
        working-directory: project
        run: node .\node_modules\grandiose\ndi.js

      - name: Install dmg-license on macOS
        if: runner.os == 'macOS'
        working-directory: project
        run: npm install dmg-license

      - name: Build production bundles
        working-directory: project
        run: npm run build

      - name: Build release artifacts
        working-directory: project
        run: npx electron-builder --config config/building/electron-builder.yaml --publish never

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.asset_globs }}
          if-no-files-found: error
          retention-days: 14

  publish_release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*
